<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>找不到頁面 | 全貸通</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;color:#2c2c2c;background:#faf6ed;line-height:1.8;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
.container{max-width:600px;margin:0 auto;padding:0 24px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center}
.error-code{font-family:'Noto Serif TC',serif;font-size:120px;font-weight:900;color:#0b1d3a;line-height:1;margin-bottom:8px}
.error-code span{color:#c8a34e}
.error-title{font-family:'Noto Serif TC',serif;font-size:28px;color:#0b1d3a;margin-bottom:16px;font-weight:700}
.error-desc{font-size:16px;color:#6b6b6b;margin-bottom:36px;line-height:1.9}
.error-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#c8a34e,#a07c2a);color:#0b1d3a;padding:14px 32px;border-radius:10px;font-weight:700;font-size:15px;transition:all .3s ease;border:none;cursor:pointer}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,163,78,.35)}
.btn-outline{display:inline-flex;align-items:center;gap:8px;border:1.5px solid rgba(11,29,58,.2);color:#0b1d3a;padding:14px 32px;border-radius:10px;font-weight:500;font-size:15px;transition:all .3s ease}
.btn-outline:hover{border-color:#c8a34e;color:#a07c2a}
footer{background:#060f1f;padding:24px 0;text-align:center}
.footer-text{font-size:13px;color:rgba(255,255,255,.4)}
@media(max-width:768px){
  .error-code{font-size:80px}
  .error-title{font-size:22px}
  .error-desc{font-size:14px}
  .error-btns{flex-direction:column;align-items:center}
}
</style>
</head>
<body>
<div class="container">
  <div class="error-code">4<span>0</span>4</div>
  <h1 class="error-title">抱歉，找不到此頁面</h1>
  <p class="error-desc">您訪問的頁面可能已被移除、更名，或網址不正確。<br>請返回首頁瀏覽我們的服務，或透過官方 Line 與我們聯繫。</p>
  <div class="error-btns">
    <a href="/" class="btn-primary">返回首頁</a>
    <a href="/#brands" class="btn-outline">查看服務方案</a>
  </div>
</div>
<footer>
  <p class="footer-text">&copy; 2024 全貸通 All Rights Reserved.</p>
</footer>
</body>
</html>
