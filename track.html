<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全連線中...</title>
    <script src="https://static.liff.line.me/edge/2/sdk.js"></script>
</head>
<body style="background-color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">

    <div style="text-align: center; margin-top: 40vh;">
        <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top: 4px solid #06C755; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #666; margin-top: 15px; font-size: 14px;">正在建立安全諮詢通道，請稍候...</p>
    </div>

    <form id="hiddenGoogleForm" action="https://docs.google.com/forms/d/e/1FAIpQLSdt21IXIq1DaquwX9aaM94nkZy-uN80NAGpNk7bCtDkB6eFzw/formResponse" method="POST" target="hiddenFrame" style="display:none;">
        <input type="text" name="entry.327429623" id="field_id">
        <input type="text" name="entry.1226500732" id="field_name">
        <input type="text" name="entry.109968411" id="field_merchant">
    </form>
    <iframe name="hiddenFrame" style="display:none;"></iframe>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const MY_LIFF_ID = "2010568596-5x1Ytgst"; 

        // 1. 優先解析商戶名稱
        const urlParams = new URLSearchParams(window.location.search);
        let source = urlParams.get('source') || '未指定商戶';

        // 2. 終局保險安全鎖：1.5 秒內無論如何，一定強制跳轉去 LINE
        const maxWaitTimeout = setTimeout(() => {
            realRedirect(source);
        }, 1500);

        // 3. 初始化 LIFF
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    // 如果沒登入（例如一般瀏覽器），直接跳轉不攔截名字，避免彈窗干擾客人
                    realRedirect(source);
                } else {
                    // 已登入狀態，默默抓取資料
                    liff.getProfile().then(profile => {
                        const lineUserId = profile.userId;     
                        const lineName = profile.displayName;  
                        
                        // 執行強力發送
                        sendToGoogleSheetsStrong(lineUserId, lineName, source);
                    }).catch((err) => {
                        console.error(err);
                        realRedirect(source); 
                    });
                }
            })
            .catch((err) => {
                console.error(err);
                realRedirect(source);
            });

        // 強力發送函式（實體 HTML 表單提交 + 傳統 Fetch 雙管齊下）
        function sendToGoogleSheetsStrong(userId, name, merchant) {
            try {
                // 實體表單塞值並提交
                document.getElementById('field_id').value = userId;
                document.getElementById('field_name').value = name;
                document.getElementById('field_merchant').value = merchant;
                document.getElementById('hiddenGoogleForm').submit();
            } catch(e) {
                console.error(e);
            }

            // 傳統 Fetch 當作第二重備份
            const formData = new FormData();
            formData.append('entry.327429623', userId);   
            formData.append('entry.1226500732', name);   
            formData.append('entry.109968411', merchant); 

            fetch("https://docs.google.com/forms/d/e/1FAIpQLSdt21IXIq1DaquwX9aaM94nkZy-uN80NAGpNk7bCtDkB6eFzw/formResponse", {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                clearTimeout(maxWaitTimeout); 
                realRedirect(merchant);
            }).catch(() => {
                clearTimeout(maxWaitTimeout);
                realRedirect(merchant); 
            });
        }

        // 官方 LINE 路由清單
        function realRedirect(sourceName) {
            let officialLineUrl = "";
            if (sourceName === "急速金") {
                officialLineUrl = "https://line.me/R/ti/p/@332flaqc?oat__id=6859299"; 
            } else if (sourceName === "鈔安心") {
                officialLineUrl = "https://line.me/R/ti/p/@887socru?oat__id=6859326";
            } else if (sourceName === "貸好運") {
                officialLineUrl = "https://line.me/R/ti/p/@749abzhp?oat__id=6859338";
            } else {
                officialLineUrl = "https://line.me/R/ti/p/@332flaqc?oat__id=6859299"; 
            }
            window.location.href = officialLineUrl;
        }
    </script>
</body>
</html>
