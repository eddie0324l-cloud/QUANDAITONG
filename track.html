<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全連線中...</title>
    <script src="https://static.liff.line.me/edge/2/sdk.js"></script>
</head>
<body style="background-color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">

    <div style="text-align: center; margin-top: 40vh;">
        <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top: 4px solid #06C755; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #666; margin-top: 15px; font-size: 14px;">正在建立安全諮詢通道，請稍候...</p>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const MY_LIFF_ID = "2010568596-5x1Ytgst"; 
        const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdt21IXIq1DaquwX9aaM94nkZy-uN80NAGpNk7bCtDkB6eFzw/formResponse";

        // 一進網頁立刻解析參數
        const urlParams = new URLSearchParams(window.location.search);
        const source = urlParams.get('source') || '未指定商戶';

        // 【核心修改】：不論如何，先向 Google 表單報到，記下一筆「點擊紀錄」
        sendToGoogleSheets("出錯未抓到ID", "出錯未抓到名字", source);

        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login(); 
                } else {
                    liff.getProfile().then(profile => {
                        const lineUserId = profile.userId;     
                        const lineName = profile.displayName;  
                        
                        // LINE 運作正常，送出完整的正確資料（這筆資料會蓋過或緊鄰上一筆）
                        sendToGoogleSheets(lineUserId, lineName, source, true);
                    }).catch((err) => {
                        console.error(err);
                        realRedirect(source); 
                    });
                }
            })
            .catch((err) => {
                console.error(err);
                realRedirect(source); 
            });

        // 統一送出資料的函式
        function sendToGoogleSheets(userId, name, merchant, isSuccess = false) {
            const formData = new FormData();
            formData.append('entry.327429623', userId);   
            formData.append('entry.1226500732', name);   
            formData.append('entry.109968411', merchant); 

            fetch(googleFormUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                // 如果是第二步（成功抓到ID後）才執行跳轉
                if (isSuccess) realRedirect(merchant);
            }).catch(() => {
                if (isSuccess) realRedirect(merchant);
            });
        }

        // 根據不同的 source 參數，跳轉到對應的官方 LINE
        function realRedirect(source) {
            let officialLineUrl = "";
            if (source === "急速金") {
                officialLineUrl = "https://line.me/R/ti/p/@332flaqc?oat__id=6859299"; 
            } else if (source === "鈔安心") {
                officialLineUrl = "https://line.me/R/ti/p/@887socru?oat__id=6859326";
            } else if (source === "貸好運") {
                officialLineUrl = "https://line.me/R/ti/p/@749abzhp?oat__id=6859338";
            } else {
                officialLineUrl = "https://line.me/R/ti/p/@332flaqc?oat__id=6859299"; 
            }
            window.location.href = officialLineUrl;
        }
    </script>
</body>
</html>
