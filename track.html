<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全連線中...</title>
    <script src="https://static.liff.line.me/edge/2/sdk.js"></script>
</head>
<body style="background-color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">

    <div style="text-align: center; margin-top: 40vh;">
        <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top: 4px solid #06C755; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #666; margin-top: 15px; font-size: 14px;">正在建立安全諮詢通道，請稍候...</p>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const MY_LIFF_ID = "2010568596-5x1Ytgst"; 
        const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdt21IXIq1DaquwX9aaM94nkZy-uN80NAGpNk7bCtDkB6eFzw/formResponse";

        // 1. 優先解析商戶名稱
        const urlParams = new URLSearchParams(window.location.search);
        let source = urlParams.get('source') || '未指定商戶';

        // 2. 終局保險安全鎖：3秒內無論網頁發生什麼事，一定強制跳轉去 LINE，絕對不讓客人卡在死畫面
        const maxWaitTimeout = setTimeout(() => {
            realRedirect(source);
        }, 3000);

        // 3. 初始化 LIFF
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    // 如果沒登入（例如一般瀏覽器），引導登入，並把目前的網址(含source參數)傳過去，登入後才會認得是哪個商戶
                    liff.login({ redirectUri: window.location.href });
                } else {
                    // 已登入狀態，開始抓取資料
                    liff.getProfile().then(profile => {
                        const lineUserId = profile.userId;     // 這就是你要的 LINE_ID
                        const lineName = profile.displayName;  // LINE 名字
                        
                        // 成功抓到資料，傳送給 Google 表單
                        sendToGoogleSheets(lineUserId, lineName, source);
                    }).catch((err) => {
                        console.error('抓取 Profile 失敗', err);
                        // 抓取失敗也要放行
                        sendToGoogleSheets("抓取失敗", "抓取失敗", source);
                    });
                }
            })
            .catch((err) => {
                console.error('LIFF 初始化失敗', err);
                // 初始化失敗（通常在一般瀏覽器可能發生）直接放行跳轉
                realRedirect(source);
            });

        // 傳送給 Google 試算表
        function sendToGoogleSheets(userId, name, merchant) {
            const formData = new FormData();
            formData.append('entry.327429623', userId);   // LINE_ID 欄位
            formData.append('entry.1226500732', name);   // LINE_Name 欄位
            formData.append('entry.109968411', merchant); // 進入商戶欄位

            fetch(googleFormUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            }).then(() => {
                clearTimeout(maxWaitTimeout); // 傳送完成，取消安全鎖，立即跳轉
                realRedirect(merchant);
            }).catch(() => {
                clearTimeout(maxWaitTimeout);
                realRedirect(merchant); 
            });
        }

        // 官方 LINE 路由清單
        function realRedirect(sourceName) {
            let officialLineUrl = "";
            if (sourceName === "急速金") {
                officialLineUrl = "https://line.me/R/ti/p/@332flaqc?oat__id=6859299"; 
            } else if (sourceName === "鈔安心") {
                officialLineUrl = "https://line.me/R/ti/p/@887socru?oat__id=6859326";
            } else if (sourceName === "貸好運") {
                officialLineUrl = "https://line.me/R/ti/p/@749abzhp?oat__id=6859338";
            } else {
                officialLineUrl = "https://line.me/R/ti/p/@332flaqc?oat__id=6859299"; 
            }
            window.location.href = officialLineUrl;
        }
    </script>
</body>
</html>
