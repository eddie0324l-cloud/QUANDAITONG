<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全連線中...</title>
    <script src="https://static.liff.line.me/edge/2/sdk.js"></script>
</head>
<body style="background-color: #f5f5f7; font-family: sans-serif;">
    <div style="text-align: center; margin-top: 40vh;">
        <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top: 4px solid #06C755; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="color: #666; margin-top: 15px; font-size: 14px;">正在建立安全諮詢通道，請稍候...</p>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        // 保險安全鎖：1.2秒內沒結束，強制去 LINE
        const maxWait = setTimeout(() => { go(); }, 1200);

        liff.init({ liffId: "2010568596-5x1Ytgst" }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(p => {
                    // ⚡【強力圖片突圍技術】將資料打包直接變成圖片網址請求
                    const uid = encodeURIComponent(p.userId);
                    const name = encodeURIComponent(p.displayName);
                    const merchant = encodeURIComponent("急速金");
                    
                    const reportUrl = `https://docs.google.com/forms/d/e/1FAIpQLSdt21IXIq1DaquwX9aaM94nkZy-uN80NAGpNk7bCtDkB6eFzw/formResponse?entry.1500645391=${uid}&entry.2124508492=${name}&entry.460775836=${merchant}&submit=Submit`;
                    
                    const img = new Image();
                    img.src = reportUrl; // 瀏覽器會強制發送這個請求去 Google 表單
                    
                    // 圖片發送後，稍等 0.3 秒確保封包送出，立即跳轉
                    setTimeout(() => { go(); }, 300);
                }).catch(() => { go(); });
            } else { go(); }
        }).catch(() => { go(); });

        function go() { window.location.href = "https://line.me/R/ti/p/@332flaqc?oat__id=6859299"; }
    </script>
</body>
</html>
