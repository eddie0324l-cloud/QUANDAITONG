<!DOCTYPE html>
<html>
<head>
    <script src="https://static.liff.line.me/edge/2/sdk.js"></script>
</head>
<body>
    <script>
        liff.init({ liffId: "2010569426-vgpGBjL5" }).then(() => {
            if (!liff.isLoggedIn()) {
                // 如果沒登入，強迫轉跳 LINE 登入頁，這是唯一能抓到資料的方法
                liff.login();
            } else {
                liff.getProfile().then(p => {
                    // 成功抓到資料，送出表單
                    sendToGoogle(p.userId, p.displayName);
                });
            }
        }).catch(() => {
            // 如果初始化真的失敗，直接跳轉客服，不浪費客人時間
            window.location.href = "https://line.me/R/ti/p/@332flaqc";
        });

        function sendToGoogle(id, name) {
            const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdt21IXIq1DaquwX9aaM94nkZy-uN80NAGpNk7bCtDkB6eFzw/formResponse";
            const data = new FormData();
            data.append("entry.1273118510", id);
            data.append("entry.1354584222", name);
            data.append("entry.2035431856", "急速金");

            fetch(formUrl, { method: "POST", body: data, mode: "no-cors" })
            .finally(() => {
                window.location.href = "https://line.me/R/ti/p/@332flaqc";
            });
        }
    </script>
</body>
</html>
