<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1d3a"/>
      <stop offset="100%" style="stop-color:#132d54"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c675"/>
      <stop offset="100%" style="stop-color:#a07c2a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Decorative circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.3"/>
  
  <!-- Main character -->
  <text x="256" y="300" 
        font-family="'Noto Serif TC', 'PMingLiU', serif" 
        font-size="220" 
        font-weight="900" 
        text-anchor="middle" 
        fill="url(#goldGrad)">貸</text>
  
  <!-- Brand name -->
  <text x="256" y="420" 
        font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" 
        font-size="48" 
        font-weight="700" 
        text-anchor="middle" 
        fill="#ffffff" 
        letter-spacing="12">全貸通</text>
  
  <!-- Subtitle -->
  <text x="256" y="460" 
        font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" 
        font-size="18" 
        font-weight="400" 
        text-anchor="middle" 
        fill="#c8a34e" 
        letter-spacing="4">QUAN DAI TONG</text>
</svg>
