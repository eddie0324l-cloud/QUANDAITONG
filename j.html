<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>偵錯診斷模式</title>
    <script src="https://static.liff.line.me/edge/2/sdk.js"></script>
</head>
<body style="background-color: #f5f5f7; font-family: sans-serif; padding: 20px;">

    <h2>🔍 系統偵錯診斷面板</h2>
    <div id="debug-status" style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccc;">
        正在初始化 LIFF...
    </div>

    <form id="googleForm" action="https://docs.google.com/forms/d/e/1FAIpQLSdt21IXIq1DaquwX9aaM94nkZy-uN80NAGpNk7bCtDkB6eFzw/formResponse" method="POST" target="hidden_iframe">
        <h3>📄 即將送出的表單內容：</h3>
        LINE ID: <input type="text" name="entry.1273118510" id="field_id" style="width:100%; padding:8px; margin:5px 0;"><br>
        名字: <input type="text" name="entry.1354584222" id="field_name" style="width:100%; padding:8px; margin:5px 0;"><br>
        商戶: <input type="text" name="entry.2035431856" value="急速金" style="width:100%; padding:8px; margin:5px 0;"><br>
        <button type="submit" style="background:#06C755; color:white; border:none; padding:10px 20px; border-radius:5px; margin-top:10px;">手動點擊送出測試</button>
    </form>
    
    <iframe name="hidden_iframe" id="hidden_iframe" style="width:100%; height:100px; margin-top:20px; border:1px dashed #999;"></iframe>

    <script>
        // ⚠️ 診斷模式下關閉自動跳轉，讓我們看清楚
        liff.init({ liffId: "2010568596-5x1Ytgst" }).then(() => {
            document.getElementById('debug-status').innerHTML = "✅ LIFF 初始化成功！";
            
            if (liff.isLoggedIn()) {
                document.getElementById('debug-status').innerHTML += "<br>✅ LINE 已登入，正在撈取資料...";
                
                liff.getProfile().then(p => {
                    document.getElementById('debug-status').innerHTML += "<br>🎉 成功撈到資料！<br><b>LINE ID:</b> " + p.userId + "<br><b>暱稱:</b> " + p.displayName;
                    
                    // 填入欄位
                    document.getElementById('field_id').value = p.userId;
                    document.getElementById('field_name').value = p.displayName;
                    
                    // 嘗試自動送出
                    document.getElementById('debug-status').innerHTML += "<br>🚀 正在嘗試自動提交表單...";
                    document.getElementById('googleForm').submit();
                    document.getElementById('debug-status').innerHTML += "<br>👍 已執行 submit()！請檢查下方內嵌網頁與 Excel 試算表。";
                    
                }).catch((err) => {
                    document.getElementById('debug-status').innerHTML += "<br>❌ 撈取 Profile 失敗: " + JSON.stringify(err);
                });
            } else {
                document.getElementById('debug-status').innerHTML += "<br>⚠️ LINE 未登入，正在引導登入...";
                liff.login();
            }
        }).catch((err) => {
            document.getElementById('debug-status').innerHTML = "❌ LIFF 初始化失敗，錯誤代碼：<br>" + JSON.stringify(err);
        });
    </script>
</body>
</html>
