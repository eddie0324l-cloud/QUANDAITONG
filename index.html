      <div class="form-group">
        <label for="consultName">姓名 *</label>
        <input
          type="text"
          id="consultName"
          name="name"
          placeholder="請輸入您的姓名"
          autocomplete="name"
          required
          style="min-height:44px;"
        >
      </div>

      <div class="form-group">
        <label for="consultPhone">電話 *</label>
        <input
          type="tel"
          id="consultPhone"
          name="phone"
          placeholder="請輸入您的手機號碼"
          autocomplete="tel"
          inputmode="tel"
          pattern="09[0-9]{8}"
          required
          style="min-height:44px;"
        >
      </div>

      <div class="form-group">
        <label for="consultType">諮詢項目 *</label>
        <select
          id="consultType"
          name="consult_type"
          required
          style="min-height:44px;"
        >
          <option value="">請選擇諮詢項目</option>
          <option value="jisujin">急速金｜快速審核</option>
          <option value="chaoanxin">鈔安心｜費用透明</option>
          <option value="daihaoyun">貸好運｜彈性額度</option>
          <option value="unsure">尚不確定，請專人協助評估</option>
        </select>
      </div>

      <button
        type="submit"
        class="cta-btn submit-btn"
        style="min-height:44px;cursor:pointer;"
      >
        送出諮詢
      </button>
    </form>
  </main>

  <script>
    /* 頂部限時優惠倒數計時器 */
    (function initCountdown() {
      var countdownEl = document.getElementById('urgencyCountdown');
      if (!countdownEl) return;

      var storageKey = 'qdt_urgency_countdown_end';
      var endTime = Number(localStorage.getItem(storageKey));

      if (!endTime || endTime <= Date.now()) {
        endTime = Date.now() + 24 * 60 * 60 * 1000;
        localStorage.setItem(storageKey, String(endTime));
      }

      function renderCountdown() {
        var remaining = Math.max(0, Math.floor((endTime - Date.now()) / 1000));

        if (remaining <= 0) {
          endTime = Date.now() + 24 * 60 * 60 * 1000;
          localStorage.setItem(storageKey, String(endTime));
          remaining = 24 * 60 * 60;
        }

        var hours = Math.floor(remaining / 3600);
        var minutes = Math.floor((remaining % 3600) / 60);
        var seconds = remaining % 60;

        countdownEl.textContent =
          String(hours).padStart(2, '0') + ':' +
          String(minutes).padStart(2, '0') + ':' +
          String(seconds).padStart(2, '0');
      }

      renderCountdown();
      setInterval(renderCountdown, 1000);
    })();

    /* FAQ 折疊展開 */
    function toggleFaq(trigger) {
      var item = trigger.closest('.faq-item');
      if (!item) return;

      var answer = item.querySelector('.faq-a');
      var isOpen = item.classList.contains('active');

      document.querySelectorAll('.faq-item').forEach(function(otherItem) {
        var otherAnswer = otherItem.querySelector('.faq-a');
        var otherTrigger = otherItem.querySelector('.faq-q');

        otherItem.classList.remove('active');
        if (otherAnswer) otherAnswer.style.maxHeight = '0px';
        if (otherTrigger) otherTrigger.setAttribute('aria-expanded', 'false');
      });

      if (!isOpen) {
        item.classList.add('active');
        if (answer) answer.style.maxHeight = answer.scrollHeight + 'px';
        trigger.setAttribute('aria-expanded', 'true');
      }
    }

    document.querySelectorAll('.faq-q').forEach(function(trigger) {
      trigger.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleFaq(trigger);
        }
      });
    });

    /* 好友推薦系統：複製推薦連結 */
    function copyReferralLink() {
      var input = document.getElementById('shareLinkInput') || document.getElementById('referralLink');
      var fallbackLink = window.location.origin + window.location.pathname + '?ref=qdt-share';
      var link = input && input.value ? input.value : fallbackLink;

      function showCopiedState() {
        var button = document.querySelector('[data-copy-referral], .share-link-copy');
        if (!button) return;

        var originalText = button.textContent;
        button.textContent = '已複製';
        setTimeout(function() {
          button.textContent = originalText || '複製推薦連結';
        }, 1800);
      }

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(link).then(showCopiedState).catch(function() {
          legacyCopy(link);
        });
      } else {
        legacyCopy(link);
      }
    }

    function legacyCopy(text) {
      var tempInput = document.createElement('input');
      tempInput.value = text;
      tempInput.setAttribute('readonly', 'readonly');
      tempInput.style.position = 'fixed';
      tempInput.style.left = '-9999px';
      document.body.appendChild(tempInput);
      tempInput.select();
      document.execCommand('copy');
      document.body.removeChild(tempInput);

      var button = document.querySelector('[data-copy-referral], .share-link-copy');
      if (button) {
        var originalText = button.textContent;
        button.textContent = '已複製';
        setTimeout(function() {
          button.textContent = originalText || '複製推薦連結';
        }, 1800);
      }
    }

    /* 相容既有按鈕 onclick="copyShareLink()" */
    function copyShareLink() {
      copyReferralLink();
    }

    /* 表單送出驗證 */
    function handleConsultation(event) {
      event.preventDefault();

      var form = event.target;
      var nameInput = form.querySelector('[name="name"]');
      var phoneInput = form.querySelector('[name="phone"]');
      var typeInput = form.querySelector('[name="consult_type"]');

      var name = nameInput ? nameInput.value.trim() : '';
      var phone = phoneInput ? phoneInput.value.trim().replace(/\D/g, '') : '';
      var consultType = typeInput ? typeInput.value : '';

      if (!name) {
        alert('請填寫姓名');
        if (nameInput) nameInput.focus();
        return false;
      }

      if (!/^09\d{8}$/.test(phone)) {
        alert('請填寫正確的手機號碼，例如 0912345678');
        if (phoneInput) phoneInput.focus();
        return false;
      }

      if (!consultType) {
        alert('請選擇諮詢項目');
        if (typeInput) typeInput.focus();
        return false;
      }

      if (typeof gtag === 'function') {
        gtag('event', 'consultation_form_submit', {
          event_category: 'conversion',
          event_label: '首頁諮詢表單',
          consult_type: consultType
        });
      }

      alert('已收到您的諮詢需求，請點擊 LINE 按鈕與專人聯繫。');
      form.reset();
      return false;
    }
  </script>
</body>
</html>
