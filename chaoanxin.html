<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 | 全貸通 CMS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* === ADMIN CSS === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0b1d3a;--navy-light:#132d54;--navy-dark:#060f1f;
  --gold:#c8a34e;--gold-light:#e0c675;--gold-dark:#a07c2a;
  --cream:#faf6ed;--white:#ffffff;
  --text:#2c2c2c;--text-light:#6b6b6b;
  --success:#2ecc71;--danger:#e74c3c;--warning:#f39c12;--info:#3498db;
  --radius:10px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'Noto Sans TC',sans-serif;background:#f0f2f5;color:var(--text);line-height:1.6}
a{text-decoration:none;color:inherit}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy),var(--navy-light));display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--white);border-radius:16px;padding:48px 40px;width:400px;max-width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.login-logo{font-size:48px;margin-bottom:12px}
.login-title{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:8px}
.login-desc{font-size:14px;color:var(--text-light);margin-bottom:28px}
.login-input{width:100%;padding:14px 18px;border:2px solid #e0e0e0;border-radius:var(--radius);font-size:15px;margin-bottom:16px;transition:border-color .3s;font-family:inherit}
.login-input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--navy);border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;transition:transform .2s;font-family:inherit}
.login-btn:hover{transform:translateY(-1px)}
.login-error{color:var(--danger);font-size:13px;margin-top:12px;display:none}

/* LAYOUT */
.admin-layout{display:none;min-height:100vh}
.admin-layout.active{display:flex}
.sidebar{width:260px;background:var(--navy);color:var(--white);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.sidebar-header{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-brand{display:flex;align-items:center;gap:12px}
.sidebar-brand img{width:36px;height:36px;border-radius:8px}
.sidebar-brand-text{font-size:18px;font-weight:700;letter-spacing:1px}
.sidebar-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}
.sidebar-nav{padding:16px 0}
.sidebar-nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;color:rgba(255,255,255,.65);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.sidebar-nav-item:hover{background:rgba(255,255,255,.05);color:var(--white)}
.sidebar-nav-item.active{background:rgba(200,163,78,.1);color:var(--gold-light);border-left-color:var(--gold)}
.sidebar-nav-item .icon{font-size:18px;width:24px;text-align:center}
.sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:12px 0}
.sidebar-section-title{padding:8px 20px;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;font-weight:700}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.sidebar-logout{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;transition:color .2s}
.sidebar-logout:hover{color:var(--white)}

/* MAIN */
.main-content{margin-left:260px;flex:1;min-height:100vh}
.topbar{background:var(--white);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:50}
.topbar-title{font-size:20px;font-weight:700;color:var(--navy)}
.topbar-actions{display:flex;gap:12px;align-items:center}
.topbar-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit}
.topbar-btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--navy)}
.topbar-btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,163,78,.3)}
.topbar-btn-outline{background:transparent;border:1.5px solid #ddd;color:var(--text)}
.topbar-btn-outline:hover{border-color:var(--gold);color:var(--gold-dark)}
.page-content{padding:32px}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:24px;overflow:hidden}
.card-header{padding:20px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:16px;font-weight:700;color:var(--navy)}
.card-body{padding:24px}

/* FORM */
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.form-hint{font-size:12px;color:var(--text-light);margin-top:4px}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .3s}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--gold)}
.form-textarea{min-height:100px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.stat-icon{font-size:28px;margin-bottom:12px}
.stat-value{font-size:28px;font-weight:900;color:var(--navy)}
.stat-label{font-size:13px;color:var(--text-light);margin-top:4px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #f0f0f0}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid #f5f5f5}
tr:hover td{background:#fafafa}

/* IMAGE UPLOAD */
.image-upload{border:2px dashed #ddd;border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .3s;position:relative}
.image-upload:hover{border-color:var(--gold);background:rgba(200,163,78,.03)}
.image-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.image-upload-icon{font-size:36px;margin-bottom:8px}
.image-upload-text{font-size:14px;color:var(--text-light)}
.image-preview{max-width:200px;max-height:150px;border-radius:8px;margin-top:12px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid #f0f0f0;margin-bottom:24px}
.tab{padding:12px 24px;font-size:14px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--gold-dark);border-bottom-color:var(--gold)}
.tab-content{display:none}
.tab-content.active{display:block}

/* FAQ ITEM */
.faq-edit-item{background:#fafafa;border:1px solid #eee;border-radius:var(--radius);padding:16px;margin-bottom:12px}
.faq-edit-item .form-row{margin-bottom:12px}
.faq-edit-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-sm{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-info{background:var(--info);color:#fff}

/* TOAST */
.toast{position:fixed;top:24px;right:24px;padding:14px 24px;border-radius:var(--radius);color:#fff;font-size:14px;font-weight:600;z-index:9999;transform:translateX(120%);transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{transform:translateX(0)}
.toast-success{background:var(--success)}
.toast-error{background:var(--danger)}

/* BRAND EDIT */
.brand-edit-card{border:1px solid #eee;border-radius:var(--radius);padding:20px;margin-bottom:20px;background:#fafafa}
.brand-edit-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.brand-edit-icon{font-size:28px}
.brand-edit-name{font-size:18px;font-weight:700;color:var(--navy)}

/* RESPONSIVE */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:768px){
  .sidebar{width:100%;position:relative;height:auto}
  .main-content{margin-left:0}
  .stats-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">

      <div class="sidebar-nav-item" onclick="showPage('export')"><span class="icon">💾</span>匯出 / 備份</div>

    <div class="sidebar-footer">
      <div class="sidebar-logout" onclick="doLogout()"><span>🚪</span> 登出系統</div>

  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">儀表板</div>
      <div class="topbar-actions">
        <button class="topbar-btn topbar-btn-outline" onclick="resetAll()">重置全部</button>

      </div>
    </div>
    <div class="page-content" id="pageContent">
      <!-- Pages rendered by JS -->
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// Load or init data
function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { return JSON.parse(saved); } catch(e) {}
  }
  return JSON.parse(JSON.stringify(defaultData));
}
function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
let cmsData = loadData();

/* ============================================
   AUTH
   ============================================ */
function doLogin() {
  const pw = document.getElementById('loginPassword').value;
  if (pw === DEFAULT_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminLayout').classList.add('active');
    sessionStorage.setItem('cms_logged_in', '1');
    showPage('dashboard');
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() {
  sessionStorage.removeItem('cms_logged_in');
  location.reload();
}
// Auto-login if session exists
if (sessionStorage.getItem('cms_logged_in') === '1') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminLayout').classList.add('active');
  showPage('dashboard');
}

/* ============================================
   PAGE ROUTER
   ============================================ */
const pageTitles = {
  dashboard:'儀表板', hero:'首頁橫幅', about:'關於我們', brands:'品牌方案',
  process:'申辦流程', faq:'常見問題', images:'圖片管理', seo:'SEO 設定',
  contact:'聯絡資訊', export:'匯出 / 備份'
};
function showPage(page) {
  document.getElementById('pageTitle').textContent = pageTitles[page] || page;
  document.querySelectorAll('.sidebar-nav-item').forEach((el,i) => {
    el.classList.toggle('active', el.textContent.trim().includes(getPageIcon(page)));
  });
  const renderers = { dashboard:renderDashboard, hero:renderHero, about:renderAbout, brands:renderBrands, process:renderProcess, faq:renderFaq, images:renderImages, seo:renderSeo, contact:renderContact, export:renderExport };
  if (renderers[page]) renderers[page]();
}
function getPageIcon(p) {
  const m = {dashboard:'儀表板',hero:'首頁橫幅',about:'關於我們',brands:'品牌方案',process:'申辦流程',faq:'常見問題',images:'圖片管理',seo:'SEO',contact:'聯絡資訊',export:'匯出'};
  return m[p]||'';
}

/* ============================================
   TOAST
   ============================================ */
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function handleImageUpload(key, input) {
  const file = input.files[0];

  reader.readAsDataURL(file);
}

function exportIndex() {
  // Generate a config JS file that the index.html can read
  const configContent = '// CMS Generated Config - ' + new Date().toISOString() + '\nwindow.CMS_DATA = ' + JSON.stringify(cmsData, null, 2) + ';';
  downloadFile('cms-config.js', configContent);
  showToast('cms-config.js 已匯出！請將此檔案上傳至網站根目錄。');
}
function exportAllData() {
  downloadFile('cms-backup-' + new Date().toISOString().slice(0,10) + '.json', JSON.stringify(cmsData, null, 2));
  showToast('CMS 資料已匯出！');
}
function importData() {
  document.getElementById('importFile').click();
}
function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      cmsData = data;
      saveData(cmsData);
      showToast('資料已匯入！');
      showPage('dashboard');
    } catch(err) {
      showToast('匯入失敗：檔案格式錯誤', 'error');
    }
  };
  reader.readAsText(file);
}
function downloadFile(name, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}
